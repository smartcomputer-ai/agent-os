services:
  redpanda:
    image: ${REDPANDA_IMAGE:-docker.redpanda.com/redpandadata/redpanda:v25.2.2}
    container_name: aos-redpanda
    restart: unless-stopped
    mem_limit: ${REDPANDA_MEM_LIMIT:-4g}
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - ${REDPANDA_SMP:-1}
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --default-log-level=info
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  console:
    image: ${REDPANDA_CONSOLE_IMAGE:-docker.redpanda.com/redpandadata/console:v3.2.1}
    container_name: aos-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio}
    container_name: aos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  mc:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc}
    profiles: ["tools"]
    depends_on:
      - minio

volumes:
  redpanda-data:
  minio-data:
